openapi: 3.0.3
info:
  title: order-service
  description: Ciclo de vida de órdenes. Las órdenes se crean por eventos Pub/Sub, no por HTTP directo.
  version: 1.0.0

servers:
  - url: http://localhost:8004
    description: Desarrollo local

tags:
  - name: Buyer Orders
  - name: Seller Orders
  - name: Admin Orders

paths:

  /orders:
    get:
      tags: [Buyer Orders]
      summary: Historial de órdenes del comprador autenticado
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, paid, in_preparation, shipped, delivered, cancelled]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Órdenes paginadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrders'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /orders/{id}:
    get:
      tags: [Buyer Orders]
      summary: Detalle de una orden del comprador
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Detalle completo de la orden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /seller/orders:
    get:
      tags: [Seller Orders]
      summary: Órdenes que contienen productos del vendedor autenticado
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Órdenes del vendedor paginadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrders'
        '403':
          $ref: '#/components/responses/Forbidden'

  /seller/orders/{id}:
    get:
      tags: [Seller Orders]
      summary: Detalle de una orden del vendedor
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Detalle de la orden con ítems del vendedor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /seller/orders/{id}/status:
    patch:
      tags: [Seller Orders]
      summary: Actualizar estado de una orden (Vendedor)
      description: |
        Transiciones permitidas para vendedor:
        - paid → in_preparation
        - in_preparation → shipped
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [in_preparation, shipped]
                notes:
                  type: string
      responses:
        '200':
          description: Estado actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Transición de estado no permitida

  /admin/orders:
    get:
      tags: [Admin Orders]
      summary: Todas las órdenes del sistema (Admin)
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: seller_id
          in: query
          schema:
            type: string
            format: uuid
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Todas las órdenes paginadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrders'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/orders/{id}/status:
    patch:
      tags: [Admin Orders]
      summary: Actualizar estado de cualquier orden (Admin)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [delivered, cancelled]
                notes:
                  type: string
      responses:
        '200':
          description: Estado actualizado
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    OrderId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    OrderItem:
      type: object
      properties:
        product_id:
          type: string
        product_name:
          type: string
        seller_id:
          type: string
          format: uuid
        quantity:
          type: integer
        unit_price:
          type: number
        subtotal:
          type: number

    OrderSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        total_amount:
          type: number
        item_count:
          type: integer
        created_at:
          type: string
          format: date-time

    OrderDetail:
      allOf:
        - $ref: '#/components/schemas/OrderSummary'
        - type: object
          properties:
            buyer_id:
              type: string
              format: uuid
            items:
              type: array
              items:
                $ref: '#/components/schemas/OrderItem'
            shipping_address:
              type: object
              properties:
                street:
                  type: string
                city:
                  type: string
                department:
                  type: string
                postal_code:
                  type: string
            status_history:
              type: array
              items:
                type: object
                properties:
                  status:
                    type: string
                  changed_by:
                    type: string
                  notes:
                    type: string
                  created_at:
                    type: string
                    format: date-time

    PaginatedOrders:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrderSummary'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer

  responses:
    Unauthorized:
      description: Token inválido o expirado
      content:
        application/json:
          schema:
            type: object
            properties:
              detail:
                type: string
    Forbidden:
      description: Sin permisos
      content:
        application/json:
          schema:
            type: object
            properties:
              detail:
                type: string
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            type: object
            properties:
              detail:
                type: string
