openapi: 3.0.3
info:
  title: auth-service
  description: Gestión de identidad, autenticación y roles de usuarios.
  version: 1.0.0

servers:
  - url: http://localhost:8001
    description: Desarrollo local

tags:
  - name: Auth
    description: Registro, login y tokens
  - name: Users
    description: Gestión de perfiles

paths:

  /auth/register/buyer:
    post:
      tags: [Auth]
      summary: Registro de comprador
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                  example: comprador@email.com
                password:
                  type: string
                  minLength: 8
                  example: segura1234
                name:
                  type: string
                  example: Mauricio Lugo
      responses:
        '201':
          description: Comprador registrado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/register/seller:
    post:
      tags: [Auth]
      summary: Registro de vendedor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name, store_name, nit]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                name:
                  type: string
                store_name:
                  type: string
                  example: Tienda Tech Mauricio
                nit:
                  type: string
                  example: 900123456-1
      responses:
        '201':
          description: Vendedor registrado, pendiente de verificación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: JWT, expira en 15 minutos
                  refresh_token:
                    type: string
                    description: Token de refresco, expira en 7 días
                  token_type:
                    type: string
                    example: bearer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refrescar Access Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Nuevo Access Token emitido
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    example: bearer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Cerrar sesión (invalida Refresh Token)
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Sesión cerrada
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me:
    get:
      tags: [Users]
      summary: Obtener perfil del usuario autenticado
      security:
        - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: Perfil del usuario
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      tags: [Users]
      summary: Actualizar perfil del usuario autenticado
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                phone:
                  type: string
                store_name:
                  type: string
                  description: Solo para vendedores
                store_description:
                  type: string
                  description: Solo para vendedores
      responses:
        '200':
          description: Perfil actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /admin/sellers:
    get:
      tags: [Users]
      summary: Listar vendedores pendientes de verificación (Admin)
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
          required: false
      responses:
        '200':
          description: Lista de vendedores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/sellers/{seller_id}/verify:
    patch:
      tags: [Users]
      summary: Aprobar o rechazar un vendedor (Admin)
      security:
        - BearerAuth: []
      parameters:
        - name: seller_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [approve, reject]
                rejection_reason:
                  type: string
                  description: Requerido si action es reject
      responses:
        '200':
          description: Verificación procesada
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [buyer, seller, admin]
        status:
          type: string
        seller_profile:
          type: object
          nullable: true
          properties:
            store_name:
              type: string
            verification_status:
              type: string
        created_at:
          type: string
          format: date-time

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
        code:
          type: string

  responses:
    Unauthorized:
      description: Token inválido o expirado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Sin permisos para esta acción
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflicto — recurso ya existe
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Error de validación en el body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
