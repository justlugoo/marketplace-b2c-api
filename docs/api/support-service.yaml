openapi: 3.0.3
info:
  title: support-service
  description: Gestión de tickets de soporte al cliente.
  version: 1.0.0

servers:
  - url: http://localhost:8006
    description: Desarrollo local

tags:
  - name: Support
  - name: Admin Support

paths:

  /support/tickets:
    post:
      tags: [Support]
      summary: Crear ticket de soporte (autenticado o anónimo)
      description: |
        Cualquier usuario puede crear un ticket. Si está autenticado,
        se asocia el `user_id` al ticket. Si no, solo se usa el email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, subject, description]
              properties:
                email:
                  type: string
                  format: email
                subject:
                  type: string
                  maxLength: 255
                description:
                  type: string
                  maxLength: 2000
      responses:
        '201':
          description: Ticket creado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticket_id:
                    type: string
                    format: uuid
                  message:
                    type: string
                    example: Tu solicitud fue recibida. Número de ticket TKT-00123.
        '422':
          $ref: '#/components/responses/ValidationError'

  /admin/tickets:
    get:
      tags: [Admin Support]
      summary: Listar tickets (Admin)
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, in_progress, resolved, closed]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de tickets paginada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Ticket'
                  total:
                    type: integer
                  page:
                    type: integer
                  total_pages:
                    type: integer
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/tickets/{id}/status:
    patch:
      tags: [Admin Support]
      summary: Actualizar estado de un ticket (Admin)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [in_progress, resolved, closed]
      responses:
        '200':
          description: Estado actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Ticket:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
          nullable: true
        email:
          type: string
        subject:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [open, in_progress, resolved, closed]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

  responses:
    Forbidden:
      description: Sin permisos
      content:
        application/json:
          schema:
            type: object
            properties:
              detail:
                type: string
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            type: object
            properties:
              detail:
                type: string
    ValidationError:
      description: Error de validación
      content:
        application/json:
          schema:
            type: object
            properties:
              detail:
                type: string
