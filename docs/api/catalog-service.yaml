openapi: 3.0.3
info:
  title: catalog-service
  description: Gestión de productos y categorías del marketplace.
  version: 1.0.0

servers:
  - url: http://localhost:8002
    description: Desarrollo local

tags:
  - name: Products
    description: CRUD de productos
  - name: Categories
    description: Gestión de categorías
  - name: Search
    description: Búsqueda y filtros

paths:

  /products:
    get:
      tags: [Search]
      summary: Buscar y listar productos activos
      parameters:
        - name: q
          in: query
          description: Texto de búsqueda (nombre y descripción)
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
            description: ID de categoría
        - name: min_price
          in: query
          schema:
            type: number
            minimum: 0
        - name: max_price
          in: query
          schema:
            type: number
        - name: sort
          in: query
          schema:
            type: string
            enum: [relevance, price_asc, price_desc]
            default: relevance
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Lista paginada de productos
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ProductSummary'
        '400':
          $ref: '#/components/responses/BadRequest'

    post:
      tags: [Products]
      summary: Crear producto (Vendedor)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreate'
      responses:
        '201':
          description: Producto creado en estado borrador
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /products/{id}:
    get:
      tags: [Products]
      summary: Obtener detalle de un producto
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Detalle del producto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Products]
      summary: Actualizar producto (Vendedor propietario o Admin)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdate'
      responses:
        '200':
          description: Producto actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Products]
      summary: Eliminar producto — soft delete (Vendedor propietario o Admin)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '204':
          description: Producto eliminado
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /products/{id}/images:
    post:
      tags: [Products]
      summary: Subir imágenes de un producto (máx. 5)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  maxItems: 5
      responses:
        '200':
          description: Imágenes subidas, URLs retornadas
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: array
                    items:
                      type: object
                      properties:
                        url:
                          type: string
                        is_primary:
                          type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /products/{id}/status:
    patch:
      tags: [Products]
      summary: Cambiar estado de un producto
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [draft, active, paused]
      responses:
        '200':
          description: Estado actualizado
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /seller/products:
    get:
      tags: [Products]
      summary: Listar productos propios del vendedor autenticado
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, paused]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Productos del vendedor paginados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  /seller/products/{id}/stock:
    patch:
      tags: [Products]
      summary: Actualizar stock de un producto
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stock]
              properties:
                stock:
                  type: integer
                  minimum: 0
      responses:
        '200':
          description: Stock actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /categories:
    get:
      tags: [Categories]
      summary: Listar todas las categorías activas (público)
      responses:
        '200':
          description: Lista de categorías
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'

    post:
      tags: [Categories]
      summary: Crear categoría (Admin)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                parent_id:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Categoría creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '403':
          $ref: '#/components/responses/Forbidden'

  /categories/{id}:
    patch:
      tags: [Categories]
      summary: Actualizar categoría (Admin)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Categoría actualizada
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Categories]
      summary: Eliminar categoría (Admin) — solo si no tiene productos activos
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Categoría eliminada
        '409':
          description: Categoría tiene productos activos, no se puede eliminar
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ProductId:
      name: id
      in: path
      required: true
      description: ID del producto (MongoDB ObjectId)
      schema:
        type: string

  schemas:
    ProductCreate:
      type: object
      required: [name, price, stock, category_id]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          minimum: 0.01
        stock:
          type: integer
          minimum: 0
        category_id:
          type: string
        attributes:
          type: object
          additionalProperties: true
          description: Atributos variables según categoría

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          minimum: 0.01
        stock:
          type: integer
          minimum: 0
        category_id:
          type: string
        attributes:
          type: object
          additionalProperties: true

    ProductSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
        stock:
          type: integer
        primary_image_url:
          type: string
          nullable: true
        seller_id:
          type: string
        category_id:
          type: string

    Product:
      allOf:
        - $ref: '#/components/schemas/ProductSummary'
        - type: object
          properties:
            description:
              type: string
            status:
              type: string
              enum: [draft, active, paused]
            images:
              type: array
              items:
                type: object
                properties:
                  url:
                    type: string
                  is_primary:
                    type: boolean
                  order:
                    type: integer
            attributes:
              type: object
              additionalProperties: true
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        parent_id:
          type: string
          nullable: true

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string

  responses:
    Unauthorized:
      description: Token inválido o expirado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Sin permisos para esta acción
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Parámetros inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Error de validación en el body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
